name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.1
        required: true
      release_name:
        description: Release title shown on GitHub
        required: true
      release_notes:
        description: Optional release notes
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Snakegame

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Snakegame/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test

      - name: Build Windows executable
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snakegame-manual-release-exe
          path: Snakegame/dist/Snakegame-*.exe
          if-no-files-found: error

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name }}
          body: ${{ inputs.release_notes }}
          target_commitish: main
          files: Snakegame/dist/Snakegame-*.exe
